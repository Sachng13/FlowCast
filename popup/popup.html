<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlowCast</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container" id="popup-container">

    <!-- ── Header ────────────────────────────────────── -->
    <header class="header">
      <div class="logo">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <defs>
              <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#6366f1"/>
                <stop offset="100%" style="stop-color:#a855f7"/>
              </linearGradient>
            </defs>
            <circle cx="14" cy="14" r="13" stroke="url(#grad)" stroke-width="2" fill="none"/>
            <polygon points="11,8 11,20 22,14" fill="url(#grad)"/>
          </svg>
        </div>
        <span class="logo-text">FlowCast</span>
      </div>
      <span class="version">v1.0</span>
    </header>

    <!-- ── Recording Mode Tabs ───────────────────────── -->
    <div class="section">
      <label class="section-label">Recording Mode</label>
      <div class="mode-tabs" id="mode-tabs">
        <button class="mode-tab active" data-mode="screen-cam">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="3" width="20" height="14" rx="2"/>
            <line x1="8" y1="21" x2="16" y2="21"/>
            <line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-left:-2px">
            <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/>
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          </svg>
          <span>Screen + Cam</span>
        </button>
        <button class="mode-tab" data-mode="screen">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="3" width="20" height="14" rx="2"/>
            <line x1="8" y1="21" x2="16" y2="21"/>
            <line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
          <span>Screen Only</span>
        </button>
        <button class="mode-tab" data-mode="cam">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 7l-7 5 7 5V7z"/>
            <rect x="1" y="5" width="15" height="14" rx="2"/>
          </svg>
          <span>Cam Only</span>
        </button>
      </div>
    </div>

    <!-- ── Device Selection ──────────────────────────── -->
    <div class="section device-section" id="camera-section">
      <label class="section-label" for="camera-select">Camera</label>
      <div class="select-wrapper">
        <select id="camera-select" class="select">
          <option value="">Loading cameras...</option>
        </select>
        <svg class="select-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
    </div>

    <div class="section device-section">
      <label class="section-label" for="mic-select">Microphone</label>
      <div class="select-wrapper">
        <select id="mic-select" class="select">
          <option value="">Loading microphones...</option>
        </select>
        <svg class="select-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
    </div>

    <!-- ── Quality Selector ──────────────────────────── -->
    <div class="section">
      <label class="section-label">Quality</label>
      <div class="quality-options" id="quality-options">
        <label class="quality-option">
          <input type="radio" name="quality" value="720p">
          <span class="quality-chip">720p</span>
        </label>
        <label class="quality-option">
          <input type="radio" name="quality" value="1080p" checked>
          <span class="quality-chip">1080p</span>
        </label>
        <label class="quality-option">
          <input type="radio" name="quality" value="4k">
          <span class="quality-chip">4K</span>
        </label>
      </div>
    </div>

    <!-- ── Start Button ──────────────────────────────── -->
    <button class="start-btn" id="start-btn">
      <div class="start-btn-glow"></div>
      <div class="start-btn-content">
        <div class="rec-dot"></div>
        <span>Start Recording</span>
      </div>
    </button>

    <!-- ── Recording Active State ────────────────────── -->
    <div class="recording-active" id="recording-active" style="display: none;">
      <div class="pulse-ring"></div>
      <span class="recording-text">Recording in progress...</span>
      <p class="recording-hint">Use the controls on the page to stop</p>
    </div>

    <!-- ── Error Banner ──────────────────────────────── -->
    <div class="error-banner" id="error-banner" style="display: none;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="15" y1="9" x2="9" y2="15"/>
        <line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
      <span id="error-text">An error occurred</span>
    </div>

    <!-- ── Footer ────────────────────────────────────── -->
    <footer class="footer">
      <span class="shortcut-hint">
        <kbd>Alt</kbd> + <kbd>Shift</kbd> + <kbd>L</kbd> to open
      </span>
    </footer>
  </div>

  <!-- ── Permission Overlay ───────────────────────── -->
  <div class="permission-overlay" id="permission-overlay" style="display: none;">
    <div class="permission-card">
      <div class="permission-icon">🎙️</div>
      <h3>Mic & Cam Access Required</h3>
      <p>FlowCast needs microphone and camera permissions to record audio and display the webcam overlay.</p>
      <button class="btn btn-primary" id="grant-permission-btn">Grant Permission</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
